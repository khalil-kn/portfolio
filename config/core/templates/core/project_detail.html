{% extends 'core/base.html' %}

{% block content %}

<div class="max-w-4xl mx-auto space-y-8">

    <h1 class="text-4xl font-bold text-gray-900 dark:text-white">
        {{ project.title }}
    </h1>

    <img src="{{ project.image|default:'https://via.placeholder.com/800x400' }}"
         class="w-full h-[400px] object-cover rounded-xl">

    <p class="text-lg text-gray-600 dark:text-gray-300 leading-relaxed">
        {{ project.description }}
    </p>

    <!-- Tags -->
    <div class="flex flex-wrap gap-2">
        {% for tag in project.tag_list %}
        <span class="bg-emerald-500 text-white text-sm px-3 py-1 rounded">
            {{ tag }}
        </span>
        {% endfor %}
    </div>

    <!-- Buttons -->
    <div class="flex gap-4 mt-6">

        {% if project.github_link %}
        <a href="{{ project.github_link }}" target="_blank"
           class="bg-gray-200 dark:bg-neutral-700 text-gray-800 dark:text-gray-200 px-4 py-2 rounded hover:bg-gray-300 dark:hover:bg-gray-600">
            View Code
        </a>
        {% endif %}

        {% if project.live_link %}
        <a href="{{ project.live_link }}" target="_blank"
           class="bg-emerald-500-500 text-white px-4 py-2 rounded hover:bg-emerald-600">
            Live Demo
        </a>
        {% endif %}

    </div>

</div>

{% endblock %}

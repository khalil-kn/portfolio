{% extends 'core/base.html' %}

{% block content %}

<section class="max-w-6xl mx-auto px-4 mt-12">

    <h2 class="text-4xl font-bold mb-10 text-center text-gray-900 dark:text-white">
        All Projects
    </h2>

    <a href="{% url 'projects_list' %}"
   class="text-sm text-gray-500 hover:text-emerald-400">
   Show All
</a>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">

        {% for project in projects %}
        <div class="bg-white dark:bg-neutral-800 rounded-xl overflow-hidden shadow-lg hover:scale-105 transition duration-300">

            <img src="{{ project.image|default:'https://via.placeholder.com/400x200' }}"
                 class="w-full h-48 object-cover">

            <div class="p-4 space-y-3">

                <h3 class="text-xl font-semibold text-gray-900 dark:text-white">
                    <a href="{% url 'project_detail' project.id %}" class="hover:underline">
                        {{ project.title }}
                    </a>
                </h3>

                <p class="text-gray-600 dark:text-gray-400 text-sm">
                    {{ project.description }}
                </p>

                <div class="flex flex-wrap gap-2">
                    {% for tag in project.tags.all %}
                    <a href="{% url 'projects_list' %}?tag={{ tag.name }}"
                    class="bg-emerald-500 text-white text-sm px-2 py-1 rounded hover:opacity-80 transition">
                        {{ tag.name }}
                    </a>
                    {% endfor %}
                </div>

            </div>

        </div>
        {% endfor %}

    </div>

</section>

{% endblock %}

{% extends 'core/base.html' %}

{% block content %}


<section class="max-w-6xl mx-auto px-4 mt-12">
<div class="relative max-w-xl mx-auto mb-10">
    
    <!-- Icon -->
    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 21l-4.35-4.35m1.35-5.65a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
    </span>

    <!-- Input -->
    <input 
    type="text" 
    id="search-input"
    placeholder="Search projects..."
    class="w-full pl-12 pr-4 py-3 rounded-xl 
    bg-white dark:bg-neutral-800 
    text-gray-900 dark:text-white 
    border border-gray-300 dark:border-neutral-700 
    shadow-sm 
    focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500
    transition"
    />

</div>

    <h2 class="text-2xl md:text-3xl lg:text-4xl font-bold mb-10 text-center text-gray-900 dark:text-white">
        All Projects
    </h2>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 px-4 sm:px-6 lg:px-0">

        {% for project in projects %}
        <div class="project-card bg-white dark:bg-neutral-800 rounded-xl overflow-hidden shadow-lg 
                    transition-all duration-300 opacity-100 scale-100"
        data-title="{{ project.title|lower }}"
     data-description="{{ project.description|lower }}"
     data-tags="{% for tag in project.tags.all %}{{ tag.name|lower }} {% endfor %}">

            <img src="{{ project.image|default:'https://via.placeholder.com/400x200' }}"
     class="w-full h-48 object-cover 
     transition-transform duration-500 
     group-hover:scale-110">

            <div class="p-4 space-y-3">

                <h3 class="text-xl font-semibold text-gray-900 dark:text-white">
                    <a href="{% url 'project_detail' project.id %}" class="hover:underline">
                        {{ project.title }}
                    </a>
                </h3>

                <p class="text-gray-600 dark:text-gray-400 text-sm">
                    {{ project.description }}
                </p>

                <div class="flex flex-wrap gap-2">
                    {% for tag in project.tags.all %}
                    <a href="{% url 'projects_list' %}?tag={{ tag.name }}"
                    class="bg-emerald-500/10 text-emerald-500 
text-xs px-3 py-1 rounded-full 
border border-emerald-500/20 
hover:bg-emerald-500 hover:text-white 
transition">
                        {{ tag.name }}
                    </a>
                    {% endfor %}
                </div>

            </div>

        </div>
        {% endfor %}

    </div>
    <p id="no-results" 
   class="text-center text-gray-400 mt-8 hidden animate-pulse">
   No projects found.
</p>
        <div class="text-center mt-8">
            <a href="{% url 'projects_list' %}"
            class="inline-block px-6 py-2 border border-emerald-500 text-emerald-400 rounded-lg hover:bg-emerald-500 hover:text-white transition">
                View All Projects
            </a>
        </div>

</section>

{% endblock %}

{% extends 'core/base.html' %}

{% block content %}

<div class="max-w-5xl mx-auto space-y-8">

    <h1 class="text-4xl font-bold">
        {{ project.title }}
    </h1>

    <img src="{{ project.image }}" class="w-full h-[400px] object-cover rounded-xl">

    <p class="text-gray-300 text-lg">
        {{ project.description }}
    </p>

    <!-- Tags -->
    <div class="flex gap-2 flex-wrap">
        {% for tag in project.tag_list %}
        <span class="bg-blue-500 px-3 py-1 rounded text-sm">
            {{ tag }}
        </span>
        {% endfor %}
    </div>

    <!-- Buttons -->
    <div class="flex gap-4 mt-6">

        {% if project.github_link %}
        <a href="{{ project.github_link }}" target="_blank"
           class="bg-gray-700 px-5 py-2 rounded hover:bg-gray-600">
            View Code
        </a>
        {% endif %}

        {% if project.live_link %}
        <a href="{{ project.live_link }}" target="_blank"
           class="bg-blue-500 px-5 py-2 rounded hover:bg-blue-600">
            Live Demo
        </a>
        {% endif %}

    </div>

</div>

{% endblock %}
